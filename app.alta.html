<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Alta y Secretaría Digital Administrador</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-blue: #0055DD;
            --brand-dark: #0D1B4B;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #cbd5e1;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .mobile-shell {
            width: 100%;
            height: 100vh;
            max-width: 414px;
            margin: 0 auto;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot-bubble {
            background: #F8FAFC;
            border: 1px solid #F1F5F9;
            padding: 1rem;
            border-radius: 0 1.5rem 1.5rem 1.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            max-width: 85%;
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.5;
            color: #334155;
        }

        .user-bubble {
            background: #0055DD;
            color: white;
            padding: 1rem;
            border-radius: 1.5rem 1.5rem 0 1.5rem;
            box-shadow: 0 4px 12px rgba(0,85,221,0.2);
            max-width: 80%;
            font-size: 0.875rem;
            font-weight: 700;
            margin-left: auto;
        }

        .typing-dot {
            width: 6px; height: 6px; background: #94a3b8; border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Logo = ({ light = false }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width="45" viewBox="0 0 32 40" fill="none">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className="text-base font-extrabold tracking-tighter mt-1">dpto <span className="font-light">libre</span></div>
            </div>
        );

        function AdminOnboardingApp() {
            // VIEWS: login, role_selection, biometric, migration_choice, chat_property, optional_contract, chat_tenant, admin_home
            const [view, setView] = useState('login'); 
            const [emailInput, setEmailInput] = useState('');
            const [migrationMethod, setMigrationMethod] = useState(null); // 'excel', 'crm', 'manual'
            
            // Chat IA y datos recolectados para Propiedad y Contrato/Inquilino
            const [chatStep, setChatStep] = useState(0); 
            const [isTyping, setIsTyping] = useState(false);
            const [chatInput, setChatInput] = useState("");
            
            // Datos del Activo
            const [propAddress, setPropAddress] = useState("");
            const [propFeatures, setPropFeatures] = useState("");
            
            // Datos del Contrato Opcional
            const [hasContract, setHasContract] = useState(false);
            const [contractRent, setContractRent] = useState("");
            
            // Datos del Inquilino AI
            const [tenantName, setTenantName] = useState("");
            const [tenantEmail, setTenantEmail] = useState("");

            const chatScrollRef = useRef(null);

            useEffect(() => {
                if (chatScrollRef.current) chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
            }, [chatStep, isTyping]);

            const advanceChat = (nextStep, delay = 800) => {
                setIsTyping(true);
                setTimeout(() => {
                    setIsTyping(false);
                    setChatStep(nextStep);
                }, delay);
            };

            const handleChatSend = (customVal) => {
                const val = customVal !== undefined ? customVal : chatInput.trim();
                if (!val && chatStep !== 2) return;
                if (customVal === undefined) setChatInput("");

                if (view === 'chat_property') {
                    if (chatStep === 0) {
                        setPropAddress(val);
                        advanceChat(1);
                    } else if (chatStep === 1) {
                        setPropFeatures(val);
                        advanceChat(2); // Pregunta si desea cargar contrato opcional
                    }
                } else if (view === 'optional_contract') {
                    if (chatStep === 0) {
                        setContractRent(val);
                        advanceChat(1);
                    }
                } else if (view === 'chat_tenant') {
                    if (chatStep === 0) {
                        setTenantName(val);
                        advanceChat(1);
                    } else if (chatStep === 1) {
                        setTenantEmail(val);
                        advanceChat(2); // Éxito total y pase al Home
                    }
                }
            };

            // --- 1. LOGIN SCREEN ---
            const LoginView = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 justify-center animate-in text-center relative">
                    <div className="absolute top-4 right-4 bg-blue-50 text-[#0055DD] text-[9px] font-black uppercase px-2.5 py-1 rounded-md tracking-wider">
                        DptoLibre OS • Admin V3.0
                    </div>
                    <Logo />
                    <h1 className="text-xl font-black mt-6 text-[#0D1B4B] uppercase tracking-tighter">PORTAL INMOBILIARIAS</h1>
                    <p className="text-slate-400 text-xs mt-1 font-medium">Automatizá la secretaría digital de tu cartera.</p>

                    <div className="space-y-3 w-full mt-8">
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold border border-slate-200 text-slate-700 bg-white shadow-sm active:scale-95 transition-all text-sm">
                            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.26 1.07-3.71 1.07-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.09H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.91l3.66-2.8z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.09l3.66 2.8c.86-2.59 3.29-4.51 6.16-4.51z" fill="#EA4335"/></svg>
                            Continuar con Google
                        </button>
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold bg-black text-white shadow-lg active:scale-95 transition-all text-sm">
                            <Icon name="apple" size={18} className="fill-white"/> Continuar con Apple
                        </button>

                        <div className="flex items-center gap-4 py-2">
                            <div className="h-[1px] flex-1 bg-slate-100"></div>
                            <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">o con email corporativo</span>
                            <div className="h-[1px] flex-1 bg-slate-100"></div>
                        </div>

                        <input 
                            type="email" 
                            placeholder="admin@inmobiliaria.com" 
                            value={emailInput}
                            onChange={(e) => setEmailInput(e.target.value)}
                            className="w-full bg-slate-50 border border-slate-200 px-4 py-3.5 rounded-2xl text-sm font-bold outline-none focus:border-[#0055DD]" 
                        />
                        <button onClick={() => setView('role_selection')} className="w-full py-4 rounded-2xl font-black bg-[#0D1B4B] text-white text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                            Acceder al Sistema
                        </button>
                    </div>
                </div>
            );

            // --- 2. SELECCIÓN DE ROL ---
            const RoleSelectionView = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 animate-in justify-center">
                    <h2 className="text-2xl font-black text-[#0D1B4B] tracking-tight mb-2 text-center uppercase">¿Cuál es tu rol?</h2>
                    <p className="text-slate-400 text-xs text-center mb-8">Flujo exclusivo para gestores e inmobiliarias.</p>
                    <div className="space-y-4">
                        {[
                            { id: 'administrador', label: 'Inmobiliaria / Administrador', desc: 'Gestiono cartera de unidades y dueños', icon: 'building', active: true },
                            { id: 'propietario', label: 'Propietario', desc: 'Tengo inmuebles particulares', icon: 'shield', active: false }
                        ].map(r => (
                            <button 
                                key={r.id} 
                                onClick={() => {
                                    if (r.active) setView('biometric');
                                    else alert("Por favor seleccioná 'Administrador' para continuar.");
                                }} 
                                className={`w-full p-6 border-2 rounded-3xl text-left flex items-center gap-4 transition-all group ${r.active ? 'border-[#0055DD] bg-blue-50/30' : 'border-slate-100 opacity-60'}`}
                            >
                                <div className="w-12 h-12 bg-blue-50 text-[#0055DD] rounded-2xl flex items-center justify-center">
                                    <Icon name={r.icon} size={22} />
                                </div>
                                <div className="flex-1">
                                    <h4 className="font-black text-[#0D1B4B] text-sm uppercase tracking-tight">{r.label}</h4>
                                    <p className="text-[10px] text-slate-400 font-medium">{r.desc}</p>
                                </div>
                                <Icon name="chevron-right" size={18} className="text-[#0055DD]" />
                            </button>
                        ))}
                    </div>
                </div>
            );

            // --- 3. VALIDACIÓN BIOMÉTRICA (POR ÚNICA VEZ) ---
            const BiometricView = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 justify-center items-center text-center animate-in">
                    <div className="w-20 h-20 bg-blue-50 text-[#0055DD] rounded-3xl flex items-center justify-center mb-6 shadow-inner">
                        <Icon name="scan-face" size={36} />
                    </div>
                    <span className="bg-indigo-100 text-indigo-700 text-[9px] font-black uppercase px-3 py-1 rounded-full mb-2">Validación Única</span>
                    <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter mb-2">Identidad y Biometría</h2>
                    <p className="text-slate-400 text-xs mb-8">Escaneo de DNI y prueba de vida para asegurar tu cuenta gestora.</p>
                    
                    <div className="w-full aspect-[3/2] bg-slate-900 rounded-3xl border-4 border-blue-100 flex items-center justify-center text-white/30 mb-8 relative overflow-hidden shadow-xl">
                        <div className="w-full h-1 bg-[#00D1FF] absolute top-1/2 shadow-[0_0_15px_#00D1FF] animate-pulse"></div>
                        <Icon name="camera" size={48} />
                    </div>

                    <button 
                        onClick={() => setView('migration_choice')} 
                        className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all"
                    >
                        Escanear y Validar Identidad
                    </button>
                </div>
            );

            // --- 4. SELECCIÓN DE MIGRACIÓN (CRM / EXCEL / MANUAL) ---
            const MigrationChoiceView = () => (
                <div className="mobile-shell bg-white flex flex-col p-6 animate-in justify-between">
                    <header className="pt-4 text-center">
                        <span className="bg-emerald-100 text-emerald-700 text-[9px] font-black uppercase px-3 py-1 rounded-full">Configuración Inicial</span>
                        <h2 className="text-xl font-black text-[#0D1B4B] uppercase tracking-tighter mt-3">Migración de Cartera</h2>
                        <p className="text-xs text-slate-400 mt-1">¿Cómo tenés organizada tu inmobiliaria actualmente?</p>
                    </header>

                    <div className="space-y-3 my-auto">
                        {[
                            { id: 'excel', title: 'Planilla Excel / CSV', desc: 'Subí tu base de datos y mapeamos propiedades y dueños al instante.', icon: 'file-spreadsheet', tag: '5 min' },
                            { id: 'crm', title: 'Integración CRM (Tokko / Zona)', desc: 'Conectá tu sistema actual por API para sincronización continua.', icon: 'plug', tag: 'Automático' },
                            { id: 'manual', title: 'Carga Propiedad a Propiedad', desc: 'Cargamos las unidades paso a paso con el asistente.', icon: 'sparkles', tag: 'Recomendado' }
                        ].map(m => (
                            <div 
                                key={m.id}
                                onClick={() => setMigrationMethod(m.id)}
                                className={`p-4 rounded-3xl border-2 cursor-pointer transition-all flex items-center gap-4 ${migrationMethod === m.id ? 'border-[#0055DD] bg-blue-50/50 shadow-md' : 'border-slate-100 hover:border-slate-300'}`}
                            >
                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 ${migrationMethod === m.id ? 'bg-[#0055DD] text-white' : 'bg-slate-100 text-slate-500'}`}>
                                    <Icon name={m.icon} size={22} />
                                </div>
                                <div className="flex-1">
                                    <div className="flex justify-between items-center">
                                        <h4 className="font-black text-slate-800 text-xs uppercase">{m.title}</h4>
                                        <span className="text-[9px] font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded uppercase">{m.tag}</span>
                                    </div>
                                    <p className="text-[10px] text-slate-400 font-medium mt-0.5">{m.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={() => {
                            if (!migrationMethod) { alert("Por favor seleccioná un método de migración."); return; }
                            setView('chat_property');
                        }} 
                        className="w-full bg-[#0055DD] text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all"
                    >
                        Continuar
                    </button>
                </div>
            );

            // --- 5. CHAT IA - CARGA DE PROPIEDAD ---
            const ChatPropertyView = () => (
                <div className="mobile-shell bg-slate-50 flex flex-col animate-in">
                    <header className="p-4 bg-white border-b flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-50 text-[#0055DD] rounded-xl flex items-center justify-center">
                                <Icon name="sparkles" size={20} />
                            </div>
                            <div>
                                <h3 className="text-xs font-black uppercase tracking-wider text-slate-800">Asistente DptoLibre</h3>
                                <p className="text-[9px] text-emerald-500 font-bold uppercase">Carga Inteligente de Activo</p>
                            </div>
                        </div>
                        <span className="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded">Paso 1 de 3</span>
                    </header>

                    <div ref={chatScrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32">
                        <div className="bot-bubble animate-bubble">
                            <p>¡Hola! Vamos a dar de alta la primera propiedad en tu cartera.</p>
                            <p className="mt-1 text-[#0055DD] font-bold italic">¿Cuál es la dirección exacta del inmueble?</p>
                        </div>

                        {chatStep >= 1 && <div className="user-bubble animate-bubble">{propAddress}</div>}

                        {chatStep === 1 && !isTyping && (
                            <div className="bot-bubble animate-bubble space-y-3">
                                <p>¡Excelente! Geolocalizado por Google Maps:</p>
                                <div className="bg-white p-3 rounded-2xl border shadow-sm">
                                    <div className="aspect-video bg-slate-200 rounded-xl mb-2 overflow-hidden relative">
                                        <img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=300&q=80" className="w-full h-full object-cover" />
                                        <div className="absolute top-2 left-2 bg-black/60 text-white text-[8px] px-2 py-0.5 rounded font-bold uppercase">Verificado</div>
                                    </div>
                                    <p className="font-black text-slate-800 text-xs">{propAddress}</p>
                                </div>
                                <p className="font-bold text-slate-700">¿Querés agregar características extra? (ej: cochera, 2 dormitorios).</p>
                            </div>
                        )}

                        {chatStep >= 2 && <div className="user-bubble animate-bubble">{propFeatures}</div>}

                        {chatStep === 2 && !isTyping && (
                            <div className="bot-bubble animate-bubble space-y-3">
                                <div className="p-4 bg-emerald-50 border border-emerald-200 rounded-2xl space-y-2">
                                    <div className="flex items-center gap-2 text-emerald-700 font-black text-xs uppercase">
                                        <Icon name="check-circle" size={16} /> Propiedad Asociada a tu Cartera
                                    </div>
                                    <p className="text-xs text-emerald-800">El inmueble fue guardado correctamente.</p>
                                    <button 
                                        onClick={() => { setHasContract(true); setView('optional_contract'); setChatStep(0); }} 
                                        className="w-full mt-2 py-3 bg-emerald-600 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md"
                                    >
                                        Continuar: Cargar Contrato y Inquilino (Opcional)
                                    </button>
                                </div>
                            </div>
                        )}

                        {isTyping && (
                            <div className="bot-bubble flex items-center gap-1.5 py-3 w-max">
                                <div className="typing-dot"></div><div className="typing-dot"></div><div className="typing-dot"></div>
                            </div>
                        )}
                    </div>

                    {chatStep < 2 && !isTyping && (
                        <footer className="p-4 bg-white border-t sticky bottom-0 z-20">
                            <div className="flex gap-2">
                                <input 
                                    type="text" 
                                    value={chatInput}
                                    onChange={(e) => setChatInput(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleChatSend(); }}
                                    placeholder={chatStep === 0 ? "Escribí la dirección exacta..." : "Ej: Cochera, 2 dormitorios..."}
                                    className="flex-1 bg-slate-50 border px-4 py-3 rounded-xl text-sm font-bold outline-none focus:border-[#0055DD]"
                                    autoFocus
                                />
                                <button 
                                    onClick={() => handleChatSend()} 
                                    className="bg-[#0055DD] text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-md active:scale-95 transition-transform shrink-0"
                                >
                                    <Icon name="send" size={18} />
                                </button>
                            </div>
                        </footer>
                    )}
                </div>
            );

            // --- 6. OPCIONAL: CARGA DE CONTRATO ---
            const OptionalContractView = () => (
                <div className="mobile-shell bg-slate-50 flex flex-col animate-in">
                    <header className="p-4 bg-white border-b flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center">
                                <Icon name="file-text" size={20} />
                            </div>
                            <div>
                                <h3 className="text-xs font-black uppercase tracking-wider text-slate-800">Asistente DptoLibre</h3>
                                <p className="text-[9px] text-indigo-500 font-bold uppercase">Paso 2 de 3 • Contrato</p>
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32">
                        <div className="bot-bubble animate-bubble space-y-3">
                            <p>¿Querés asociar un contrato de alquiler vigente a esta propiedad ahora mismo?</p>
                            <p className="text-[10px] text-slate-400 font-medium">Esto activará el cobro automático y el fondo de resguardo.</p>
                            <div className="flex gap-2 pt-2">
                                <button 
                                    onClick={() => setView('admin_home')} 
                                    className="flex-1 py-3 bg-slate-200 text-slate-700 font-black rounded-xl text-xs uppercase hover:bg-slate-300 transition-colors"
                                >
                                    No, dejar vacante
                                </button>
                                <button 
                                    onClick={() => advanceChat(0)} 
                                    className="flex-1 py-3 bg-[#0055DD] text-white font-black rounded-xl text-xs uppercase shadow-md hover:bg-blue-700 transition-colors"
                                >
                                    Sí, cargar contrato
                                </button>
                            </div>
                        </div>

                        {chatStep >= 0 && <div className="user-bubble animate-bubble">Sí, cargar contrato</div>}

                        {chatStep === 0 && !isTyping && (
                            <div className="bot-bubble animate-bubble space-y-3">
                                <p className="text-[#0055DD] font-bold italic">¿Cuál es el monto mensual actual del alquiler?</p>
                            </div>
                        )}

                        {chatStep >= 1 && <div className="user-bubble animate-bubble">${contractRent}</div>}

                        {chatStep === 1 && !isTyping && (
                            <div className="bot-bubble animate-bubble space-y-3">
                                <div className="p-4 bg-indigo-50 border border-indigo-200 rounded-2xl space-y-2">
                                    <p className="text-xs font-black text-indigo-900 uppercase">Monto registrado: ${contractRent}</p>
                                    <button 
                                        onClick={() => { setView('chat_tenant'); setChatStep(0); }} 
                                        className="w-full mt-2 py-3 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md"
                                    >
                                        Continuar: Vincular Inquilino
                                    </button>
                                </div>
                            </div>
                        )}

                        {isTyping && (
                            <div className="bot-bubble flex items-center gap-1.5 py-3 w-max">
                                <div className="typing-dot"></div><div className="typing-dot"></div><div className="typing-dot"></div>
                            </div>
                        )}
                    </div>

                    {chatStep === 0 && !isTyping && (
                        <footer className="p-4 bg-white border-t sticky bottom-0 z-20">
                            <div className="flex gap-2">
                                <input 
                                    type="number" 
                                    value={chatInput}
                                    onChange={(e) => setChatInput(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleChatSend(); }}
                                    placeholder="Ej: 450000"
                                    className="flex-1 bg-slate-50 border px-4 py-3 rounded-xl text-sm font-bold outline-none focus:border-[#0055DD]"
                                    autoFocus
                                />
                                <button 
                                    onClick={() => handleChatSend()} 
                                    className="bg-[#0055DD] text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-md active:scale-95 transition-transform shrink-0"
                                >
                                    <Icon name="send" size={18} />
                                </button>
                            </div>
                        </footer>
                    )}
                </div>
            );

            // --- 7. CHAT IA - INVITACIÓN DE INQUILINO ---
            const ChatTenantView = () => (
                <div className="mobile-shell bg-slate-50 flex flex-col animate-in">
                    <header className="p-4 bg-white border-b flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center">
                                <Icon name="user-plus" size={20} />
                            </div>
                            <div>
                                <h3 className="text-xs font-black uppercase tracking-wider text-slate-800">Asistente DptoLibre</h3>
                                <p className="text-[9px] text-emerald-500 font-bold uppercase">Paso 3 de 3 • Inquilino</p>
                            </div>
                        </div>
                    </header>

                    <div ref={chatScrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32">
                        <div className="bot-bubble animate-bubble">
                            <p>¡Excelente! Ya configuramos la unidad y el contrato.</p>
                            <p className="mt-1 text-[#0055DD] font-bold italic">¿Cuál es el nombre completo del inquilino?</p>
                        </div>

                        {chatStep >= 1 && <div className="user-bubble animate-bubble">{tenantName}</div>}

                        {chatStep === 1 && !isTyping && (
                            <div className="bot-bubble animate-bubble space-y-2">
                                <p className="text-[#0055DD] font-bold italic">¿Cuál es su correo electrónico o celular (WhatsApp) para enviarle el link de acceso?</p>
                            </div>
                        )}

                        {chatStep >= 2 && <div className="user-bubble animate-bubble">{tenantEmail}</div>}

                        {chatStep === 2 && !isTyping && (
                            <div className="bot-bubble animate-bubble space-y-4">
                                <div className="p-4 bg-emerald-50 border border-emerald-200 rounded-2xl space-y-2">
                                    <div className="flex items-center gap-2 text-emerald-700 font-black text-xs uppercase">
                                        <Icon name="check-circle" size={16} /> ¡Onboarding de Administrador Exitoso!
                                    </div>
                                    <p className="text-xs text-emerald-800 leading-relaxed">
                                        Se le envió una invitación formal a <b>{tenantName}</b>. Tu cartera ya está activa.
                                    </p>
                                    <button onClick={() => setView('admin_home')} className="w-full mt-2 py-3 bg-emerald-600 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md">
                                        Ingresar a la Consola de Administración
                                    </button>
                                </div>
                            </div>
                        )}

                        {isTyping && (
                            <div className="bot-bubble flex items-center gap-1.5 py-3 w-max">
                                <div className="typing-dot"></div><div className="typing-dot"></div><div className="typing-dot"></div>
                            </div>
                        )}
                    </div>

                    {chatStep < 2 && !isTyping && (
                        <footer className="p-4 bg-white border-t sticky bottom-0 z-20">
                            <div className="flex gap-2">
                                <input 
                                    type="text" 
                                    value={chatInput}
                                    onChange={(e) => setChatInput(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleChatSend(); }}
                                    placeholder={chatStep === 0 ? "Ej: Juan Pérez" : "ej: juan@email.com o +54351..."}
                                    className="flex-1 bg-slate-50 border px-4 py-3 rounded-xl text-sm font-bold outline-none focus:border-[#0055DD]"
                                    autoFocus
                                />
                                <button 
                                    onClick={() => handleChatSend()} 
                                    className="bg-[#0055DD] text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-md active:scale-95 transition-transform shrink-0"
                                >
                                    <Icon name="send" size={18} />
                                </button>
                            </div>
                        </footer>
                    )}
                </div>
            );

            // --- 8. HOME DEL ADMINISTRADOR ---
            const AdminHomeView = () => (
                <div className="mobile-shell bg-[#F0F2F6] flex flex-col animate-in overflow-y-auto no-scrollbar pb-24">
                    <header className="p-6 bg-slate-900 text-white flex justify-between items-center rounded-b-[2.5rem] shadow-xl">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full border-2 border-emerald-400 overflow-hidden bg-slate-800">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=AdminRaices" alt="Admin" />
                            </div>
                            <div>
                                <h3 className="text-xs font-black leading-none">Inmobiliaria Raíces</h3>
                                <p className="text-[9px] font-bold text-emerald-400 uppercase mt-1">Cartera Activa</p>
                            </div>
                        </div>
                        <Icon name="bell" size={20} className="text-slate-400" />
                    </header>

                    <main className="p-6 space-y-6">
                        {/* Bolsillo Honorarios */}
                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                            <div className="flex justify-between items-center">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Bolsillo de Honorarios (Split)</p>
                                <span className="bg-emerald-100 text-emerald-700 text-[9px] font-black px-2 py-0.5 rounded uppercase">Rinde 81% T+0</span>
                            </div>
                            <h2 className="text-3xl font-black text-slate-900 tracking-tighter">$840.500</h2>
                            <button className="w-full bg-indigo-600 text-white py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                                Retirar Comisión o Invertir
                            </button>
                        </div>

                        {/* Veredictos Pendientes */}
                        <div className="space-y-3">
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Veredictos de IA Pendientes (1)</h4>
                            
                            <div className="bg-white p-5 rounded-3xl border shadow-sm space-y-3 border-l-4 border-l-emerald-500">
                                <div className="flex justify-between items-start">
                                    <span className="text-[9px] font-black bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded uppercase">Listo para OK</span>
                                    <span className="text-[10px] font-bold text-slate-400">Score 890</span>
                                </div>
                                <div>
                                    <h5 className="font-black text-slate-800 text-xs">{tenantName || "Marcos Galperin"} • {propAddress || "Caseros 1230"}</h5>
                                    <p className="text-[10px] text-slate-500 mt-0.5">Legajo verificado 100%. Inquilino con firma digital lista.</p>
                                </div>
                                <button onClick={() => alert("¡OK Final emitido! Contrato activado y factura ARCA generada.")} className="w-full bg-emerald-500 text-slate-900 py-3 rounded-xl font-black text-xs uppercase tracking-widest shadow-md">
                                    Dar OK Final y Activar
                                </button>
                            </div>
                        </div>

                        {/* Acciones Operativas */}
                        <div className="bg-white p-5 rounded-3xl border shadow-sm space-y-3">
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Acciones Operativas</h4>
                            <div className="grid grid-cols-2 gap-3">
                                <button onClick={() => alert("Generando QR masivo...")} className="p-3 bg-slate-50 rounded-2xl border text-left hover:bg-blue-50 transition-colors">
                                    <Icon name="qr-code" size={20} className="text-[#0055DD] mb-1" />
                                    <p className="text-xs font-black text-slate-800">QRs de Cartera</p>
                                    <p className="text-[9px] text-slate-400">Imprimibles / WhatsApp</p>
                                </button>
                                <button onClick={() => alert("Exportando a formato AFIP/ARCA...")} className="p-3 bg-slate-50 rounded-2xl border text-left hover:bg-blue-50 transition-colors">
                                    <Icon name="file-spreadsheet" size={20} className="text-[#0055DD] mb-1" />
                                    <p className="text-[10px] font-black text-slate-800">Exportar ARCA</p>
                                    <p className="text-[9px] text-slate-400">Facturación automática</p>
                                </button>
                            </div>
                        </div>
                    </main>

                    {/* Nav inferior */}
                    <nav className="absolute bottom-0 w-full bg-white border-t p-4 flex justify-around items-center">
                        <div className="text-[#0055DD] flex flex-col items-center gap-1"><Icon name="layout-dashboard"/><span className="text-[8px] font-black uppercase">Torre</span></div>
                        <div className="text-slate-300 flex flex-col items-center gap-1"><Icon name="building"/><span className="text-[8px] font-black uppercase">Unidades</span></div>
                        <div className="text-slate-300 flex flex-col items-center gap-1"><Icon name="wallet"/><span className="text-[8px] font-black uppercase">Tesorería</span></div>
                        <div className="text-slate-300 flex flex-col items-center gap-1"><Icon name="settings"/><span className="text-[8px] font-black uppercase">Admin</span></div>
                    </nav>
                </div>
            );

            return (
                <div className="h-screen w-full flex flex-col items-center justify-center p-4">
                    <div className="mobile-shell">
                        {/* Notch */}
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-[#0D1B4B] rounded-b-3xl z-[150] flex items-center justify-center gap-2 shadow-sm">
                            <div className="w-1.5 h-1.5 rounded-full bg-white/20"></div>
                            <div className="w-10 h-1 bg-white/20 rounded-full"></div>
                        </div>

                        {view === 'login' && <LoginView />}
                        {view === 'role_selection' && <RoleSelectionView />}
                        {view === 'biometric' && <BiometricView />}
                        {view === 'migration_choice' && <MigrationChoiceView />}
                        {view === 'chat_property' && <ChatPropertyView />}
                        {view === 'optional_contract' && <OptionalContractView />}
                        {view === 'chat_tenant' && <ChatTenantView />}
                        {view === 'admin_home' && <AdminHomeView />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminOnboardingApp />);
    </script>
</body>
</html>
